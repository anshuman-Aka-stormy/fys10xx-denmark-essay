name: Build and publish computational essay

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install notebook requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute notebook and rebuild plots
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute \
            --inplace \
            --ExecutePreprocessor.timeout=180 \
            FYS10XX_computational_essay_example_denmark_wind.ipynb

      - name: Convert executed notebook to HTML
        run: |
          mkdir -p _site
          jupyter nbconvert \
            --to html \
            --output-dir _site \
            --output index.html \
            FYS10XX_computational_essay_example_denmark_wind.ipynb
          cp -r data _site/data
          cp denmark_wind_carbon_2010_2024.svg _site/ || true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
